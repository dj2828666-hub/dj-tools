<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>六爻解卦辅助工具</title>
<style>
    :root {
        --paper: #fdf8ee;
        --paper-deep: #f7f0df;
        --ink: #4a3826;
        --ink-soft: #7a6650;
        --brand: #8B4513;
        --brand-deep: #6b3310;
        --brand-light: #d2b48c;
        --line: #e8ddc7;
        --accent: #b23c2e;
        --good: #4c8c5a;
        --shadow: 0 4px 16px rgba(90, 62, 34, 0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { -webkit-text-size-adjust: 100%; }

    body {
        font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
        background: var(--paper-deep);
        color: var(--ink);
        line-height: 1.55;
        padding-bottom: calc(90px + env(safe-area-inset-bottom));
        background-image:
            radial-gradient(circle at 10% 10%, rgba(139,69,19,0.05), transparent 40%),
            radial-gradient(circle at 90% 90%, rgba(139,69,19,0.05), transparent 40%);
    }

    .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        background: linear-gradient(to bottom, var(--brand), var(--brand-deep));
        color: #fdf3e4;
        padding: 12px 16px calc(10px + env(safe-area-inset-top)/4);
        padding-top: max(12px, env(safe-area-inset-top));
        text-align: center;
        box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .topbar h1 {
        font-size: 19px;
        letter-spacing: 2px;
        font-weight: 600;
    }

    .topbar .clock {
        margin-top: 4px;
        font-size: 12px;
        opacity: 0.92;
        letter-spacing: 0.5px;
    }

    .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 14px 12px 6px;
    }

    .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 16px;
        margin-bottom: 14px;
    }

    .card h2 {
        font-size: 15px;
        color: var(--brand);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }

    .card h2 .num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--brand);
        color: #fff;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    /* 求测事项 */
    #query {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--brand-light);
        border-radius: 10px;
        font-size: 16px;
        background: #fffdf8;
        color: var(--ink);
    }
    #query:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(139,69,19,0.12); }

    .quick-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
    }
    .quick-tag {
        font-size: 12px;
        padding: 5px 11px;
        border-radius: 20px;
        background: var(--paper-deep);
        border: 1px solid var(--line);
        color: var(--ink-soft);
    }
    .quick-tag:active { background: var(--brand-light); color: #fff; }

    /* 起卦时间 */
    .dt-row {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    input[type="datetime-local"] {
        flex: 1;
        padding: 11px 10px;
        border: 1px solid var(--brand-light);
        border-radius: 10px;
        font-size: 15px;
        background: #fffdf8;
        color: var(--ink);
        min-width: 0;
    }
    .now-btn {
        flex-shrink: 0;
        padding: 11px 14px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(to bottom, var(--brand), var(--brand-deep));
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
    }
    .now-btn:active { opacity: 0.85; }

    .ganzhi-board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-top: 14px;
    }
    .gz-cell {
        text-align: center;
        background: linear-gradient(180deg, #fffdf8, var(--paper-deep));
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 4px 8px;
    }
    .gz-cell .label {
        font-size: 11px;
        color: var(--ink-soft);
        margin-bottom: 4px;
    }
    .gz-cell .value {
        font-size: 18px;
        font-weight: 700;
        color: var(--brand-deep);
        letter-spacing: 1px;
    }
    .gz-note {
        margin-top: 10px;
        font-size: 11.5px;
        color: var(--ink-soft);
        text-align: center;
        line-height: 1.5;
    }

    details.manual-edit {
        margin-top: 12px;
        border-top: 1px dashed var(--line);
        padding-top: 10px;
    }
    details.manual-edit summary {
        font-size: 12.5px;
        color: var(--brand);
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    details.manual-edit summary::-webkit-details-marker { display: none; }
    details.manual-edit summary::after {
        content: "▾";
        transition: transform 0.2s;
    }
    details.manual-edit[open] summary::after { transform: rotate(180deg); }

    .manual-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
    }
    .manual-grid label {
        font-size: 12px;
        color: var(--ink-soft);
        display: block;
        margin-bottom: 4px;
    }
    .manual-grid input {
        width: 100%;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        background: #fffdf8;
        color: var(--ink);
    }

    /* 卦象输入 */
    .gua-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin: -4px 0 12px;
    }
    .ghost-btn {
        font-size: 12.5px;
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid var(--brand-light);
        background: #fffdf8;
        color: var(--brand-deep);
        font-weight: 600;
    }
    .ghost-btn:active { background: var(--paper-deep); }

    .yao-list { display: flex; flex-direction: column; gap: 10px; }

    .yao-row {
        background: #fffdf8;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px 12px;
        position: relative;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .yao-row.is-moving { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(178,60,46,0.08); }

    .yao-row-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .yao-name {
        font-size: 13.5px;
        font-weight: 700;
        color: var(--brand-deep);
    }
    .yao-badge {
        font-size: 10.5px;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 1px 8px;
        display: none;
    }
    .yao-row.is-moving .yao-badge { display: inline-block; }

    .yao-options {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
    }
    .yao-btn { display: block; }
    .yao-btn input { position: absolute; opacity: 0; pointer-events: none; }
    .yao-btn .pill {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 9px 2px;
        border-radius: 9px;
        border: 1px solid var(--line);
        background: var(--paper-deep);
        color: var(--ink-soft);
        font-size: 11.5px;
        min-height: 46px;
        transition: all 0.15s;
    }
    .yao-btn .pill .sym {
        font-size: 15px;
        font-weight: 800;
        color: var(--brand);
        line-height: 1;
    }
    .yao-btn input:checked + .pill {
        background: linear-gradient(to bottom, var(--brand), var(--brand-deep));
        border-color: var(--brand-deep);
        color: #fff;
    }
    .yao-btn input:checked + .pill .sym { color: #fff; }
    .yao-btn:active .pill { transform: scale(0.96); }

    .gua-image-container {
        text-align: center;
        margin-top: 12px;
        padding: 10px;
        border: 1px dashed var(--brand-light);
        border-radius: 10px;
        background: var(--paper-deep);
        display: none;
    }
    .gua-image { max-width: 100%; border-radius: 8px; }

    /* 自动排盘预览 */
    .paipan-empty {
        text-align: center;
        color: var(--ink-soft);
        font-size: 12.5px;
        padding: 10px 4px;
    }
    .paipan-summary {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 6px 14px;
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px dashed var(--line);
    }
    .paipan-summary b { color: var(--brand-deep); }
    table.paipan-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }
    table.paipan-table th {
        font-size: 10.5px;
        color: var(--ink-soft);
        font-weight: 500;
        padding: 4px 2px;
        text-align: center;
        border-bottom: 1px solid var(--line);
    }
    table.paipan-table td {
        padding: 6px 2px;
        text-align: center;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
    }
    table.paipan-table tr:last-child td { border-bottom: none; }
    .pp-liuqin { font-weight: 700; color: var(--brand-deep); }
    .pp-najia { color: var(--ink); }
    .pp-yao-sym { font-weight: 800; color: var(--brand); }
    .pp-tags { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; }
    .pp-tag {
        font-size: 9.5px;
        padding: 1px 5px;
        border-radius: 8px;
        color: #fff;
        line-height: 1.5;
    }
    .pp-tag.world { background: var(--accent); }
    .pp-tag.resp { background: var(--good); }
    .pp-tag.void { background: var(--ink-soft); }
    .pp-tag.move { background: var(--brand); }
    .pp-bian { font-size: 10.5px; color: var(--accent); }

    /* 提示词结果 */
    textarea {
        width: 100%;
        height: 260px;
        padding: 12px;
        border: 1px solid var(--brand-light);
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.6;
        resize: vertical;
        background: var(--paper-deep);
        font-family: Consolas, Monaco, monospace;
        color: var(--ink);
    }
    .copy-btn {
        margin-top: 10px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(to bottom, var(--good), #3d7a49);
        color: #fff;
        font-size: 14.5px;
        font-weight: 700;
    }
    .copy-btn:active { opacity: 0.85; }
    .tip { color: var(--ink-soft); font-size: 11.5px; margin-top: 8px; text-align: center; }

    /* 底部固定生成按钮 */
    .bottom-bar {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        z-index: 30;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: linear-gradient(to top, var(--paper-deep) 70%, rgba(247,240,223,0));
    }
    .bottom-bar-inner { max-width: 560px; margin: 0 auto; }
    #generateBtn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(to bottom, var(--brand), var(--brand-deep));
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 2px;
        box-shadow: 0 6px 18px rgba(139,69,19,0.35);
    }
    #generateBtn:active { transform: translateY(1px); box-shadow: 0 3px 8px rgba(139,69,19,0.3); }

    .toast {
        position: fixed;
        left: 50%; bottom: 100px;
        transform: translateX(-50%) translateY(10px);
        background: rgba(74,56,38,0.94);
        color: #fff;
        padding: 9px 18px;
        border-radius: 20px;
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s;
        z-index: 50;
        white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 稍宽屏幕（平板/桌面）优化，但仍保持单栏节奏 */
    @media (min-width: 600px) {
        .wrap { padding: 20px 16px 6px; }
        .card { padding: 20px; }
        textarea { height: 320px; }
    }
</style>
</head>
<body>

    <div class="topbar">
        <h1>六爻解卦辅助工具</h1>
        <div class="clock" id="liveClock">当前时间：加载中...</div>
    </div>

    <div class="wrap">

        <!-- 一、求测事项 -->
        <div class="card">
            <h2><span class="num">1</span>求测事项</h2>
            <input type="text" id="query" placeholder="例如：事业晋升、感情发展、健康状况等">
            <div class="quick-tags">
                <span class="quick-tag" data-q="事业发展">事业发展</span>
                <span class="quick-tag" data-q="感情婚姻">感情婚姻</span>
                <span class="quick-tag" data-q="财运求财">财运求财</span>
                <span class="quick-tag" data-q="健康状况">健康状况</span>
                <span class="quick-tag" data-q="考试学业">考试学业</span>
            </div>
        </div>

        <!-- 二、起卦时间 -->
        <div class="card">
            <h2><span class="num">2</span>起卦时间</h2>
            <div class="dt-row">
                <input type="datetime-local" id="baseDateTime">
                <button type="button" class="now-btn" id="syncNowBtn">此刻</button>
            </div>

            <div class="ganzhi-board">
                <div class="gz-cell"><div class="label">年柱</div><div class="value" id="yearDisplay">-</div></div>
                <div class="gz-cell"><div class="label">月柱</div><div class="value" id="monthDisplay">-</div></div>
                <div class="gz-cell"><div class="label">日柱</div><div class="value" id="dayDisplay">-</div></div>
                <div class="gz-cell"><div class="label">时柱</div><div class="value" id="hourDisplay">-</div></div>
            </div>
            <div class="gz-note">四柱已按立春分年、节气分月、23点起次日算法自动排出（东八区），如与万年历个别存疑可展开手动修改</div>

            <details class="manual-edit">
                <summary>手动修改干支（高级）</summary>
                <div class="manual-grid">
                    <div><label for="year">年柱干支</label><input type="text" id="year" placeholder="例如：甲辰"></div>
                    <div><label for="month">月柱干支</label><input type="text" id="month" placeholder="例如：丙寅"></div>
                    <div><label for="day">日柱干支</label><input type="text" id="day" placeholder="例如：戊午"></div>
                    <div><label for="hour">时柱干支</label><input type="text" id="hour" placeholder="例如：壬子"></div>
                </div>
            </details>

            <div class="gua-image-container" id="guaImageContainer">
                <img src="gua-xiang.png" alt="卦象对比" class="gua-image">
            </div>
        </div>

        <!-- 三、卦象输入 -->
        <div class="card">
            <h2><span class="num">3</span>卦象输入</h2>
            <div class="gua-toolbar">
                <button type="button" class="ghost-btn" id="compareBtn">卦象对比图</button>
            </div>

            <div class="yao-list" id="yaoList">
                <!-- 六爻由 JS 生成，顺序：上爻→初爻 -->
            </div>
        </div>

        <!-- 自动排盘预览 -->
        <div class="card">
            <h2><span class="num">✓</span>自动排盘（纳甲·六亲·世应·六神）</h2>
            <div id="paipanArea">
                <div class="paipan-empty">选完六个爻之后，这里会自动排出专业卦盘</div>
            </div>
        </div>

        <!-- 四、提示词 -->
        <div class="card result-area">
            <h2><span class="num">4</span>大模型提示词</h2>
            <textarea id="promptOutput" readonly placeholder="点击下方「生成提示词」按钮..."></textarea>
            <button type="button" class="copy-btn" id="copyBtn">复制提示词</button>
            <p class="tip">复制此提示词并粘贴到 DeepSeek、ChatGPT 等大模型中进行卦象解析</p>
        </div>

    </div>

    <div class="bottom-bar">
        <div class="bottom-bar-inner">
            <button type="button" id="generateBtn">生成提示词</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
/* ============ 干支速查表 ============ */
const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
// 24节气累积分钟偏移表（寿星天文历近似算法，基准 1900-01-06 02:05，1900-2100年内足够精确）
const S_TERM_INFO = [0,21208,42467,63836,85337,107014,128867,150921,173149,
    195551,218072,240693,263343,285989,308563,331033,353350,375494,
    397447,419210,440795,462224,483532,504758];

function getTermDate(y, n) {
    const base = new Date(1900, 0, 6, 2, 5, 0).getTime();
    const offsetMs = (525948.76 * (y - 1900) + S_TERM_INFO[n]) * 60000;
    return new Date(base + offsetMs);
}

function toJDN(y, m, d) {
    const a = Math.floor((14 - m) / 12);
    const y2 = y + 4800 - a;
    const m2 = m + 12 * a - 3;
    return d + Math.floor((153 * m2 + 2) / 5) + 365 * y2 + Math.floor(y2 / 4) - Math.floor(y2 / 100) + Math.floor(y2 / 400) - 32045;
}

/* 根据任意时间点计算年/月/日/时四柱干支 */
function getGanZhi(date) {
    const y = date.getFullYear();

    // 年柱：以立春为界
    const lichunThisYear = getTermDate(y, 2);
    const ganzhiYear = date >= lichunThisYear ? y : y - 1;
    const yearStemIdx = ((ganzhiYear - 4) % 10 + 10) % 10;
    const yearBranchIdx = ((ganzhiYear - 4) % 12 + 12) % 12;

    // 月柱：以十二节为界（去年大雪 + 今年12节 + 明年小寒兜底）
    const nodes = [{ idx: 22, date: getTermDate(y - 1, 22) }];
    for (let idx = 0; idx <= 22; idx += 2) nodes.push({ idx, date: getTermDate(y, idx) });
    nodes.push({ idx: 0, date: getTermDate(y + 1, 0) });

    let current = nodes[0];
    for (const node of nodes) {
        if (node.date <= date) current = node; else break;
    }
    const m = ((current.idx / 2 - 1) + 12) % 12; // 0=寅月 ... 11=丑月
    const firstMonthStemIdx = ((yearStemIdx % 5) * 2 + 2) % 10; // 五虎遁
    const monthStemIdx = (firstMonthStemIdx + m) % 10;
    const monthBranchIdx = (2 + m) % 12;

    // 日柱：儒略日法，23点后算作次日（晚子时归次日）
    let dayDate = new Date(date);
    if (dayDate.getHours() >= 23) dayDate.setDate(dayDate.getDate() + 1);
    const jdn = toJDN(dayDate.getFullYear(), dayDate.getMonth() + 1, dayDate.getDate());
    const dayStemIdx = ((jdn + 9) % 10 + 10) % 10;
    const dayBranchIdx = ((jdn + 1) % 12 + 12) % 12;

    // 时柱：五鼠遁
    const hour = date.getHours();
    const hourBranchIdx = Math.floor((hour + 1) / 2) % 12;
    const ziStemIdx = (dayStemIdx % 5) * 2;
    const hourStemIdx = (ziStemIdx + hourBranchIdx) % 10;

    return {
        year: STEMS[yearStemIdx] + BRANCHES[yearBranchIdx],
        month: STEMS[monthStemIdx] + BRANCHES[monthBranchIdx],
        day: STEMS[dayStemIdx] + BRANCHES[dayBranchIdx],
        hour: STEMS[hourStemIdx] + BRANCHES[hourBranchIdx],
        hourLabel: `${BRANCHES[hourBranchIdx]}时`
    };
}

/* ============ 六十四卦自动排盘引擎（纳甲·六亲·世应·六神·空亡）============ */
const TRIGRAM_BITS = {
    '乾': [1,1,1], '坤': [0,0,0], '震': [1,0,0], '坎': [0,1,0],
    '艮': [0,0,1], '巽': [0,1,1], '离': [1,0,1], '兑': [1,1,0]
};
const TRIGRAM_ELEMENT = { '乾':'金','兑':'金','离':'火','震':'木','巽':'木','坎':'水','艮':'土','坤':'土' };
const TRIGRAM_NAMES = Object.keys(TRIGRAM_BITS);

// 六十四卦卦名表：GUA_NAME_TABLE[上卦][下卦] = 卦名
const GUA_NAME_TABLE = {
    '乾': {'乾':'乾为天','兑':'天泽履','离':'天火同人','震':'天雷无妄','巽':'天风姤','坎':'天水讼','艮':'天山遁','坤':'天地否'},
    '兑': {'乾':'泽天夬','兑':'兑为泽','离':'泽火革','震':'泽雷随','巽':'泽风大过','坎':'泽水困','艮':'泽山咸','坤':'泽地萃'},

    '坤': {'乾':'地天泰','兑':'地泽临','离':'地火明夷','震':'地雷复','巽':'地风升','坎':'地水师','艮':'地山谦','坤':'坤为地'}
};

// 京房纳甲表：每个三爻卦在内卦(初二三爻)/外卦(四五上爻)时纳的天干地支
const NAJIA_TABLE = {
    '乾': { inner: ['甲子','甲寅','甲辰'], outer: ['壬午','壬申','壬戌'] },
    '坤': { inner: ['乙未','乙巳','乙卯'], outer: ['癸丑','癸亥','癸酉'] },
    '震': { inner: ['庚子','庚寅','庚辰'], outer: ['庚午','庚申','庚戌'] },
    '巽': { inner: ['辛丑','辛亥','辛酉'], outer: ['辛未','辛巳','辛卯'] },
    '坎': { inner: ['戊寅','戊辰','戊午'], outer: ['戊申','戊戌','戊子'] },
    '离': { inner: ['己卯','己丑','己亥'], outer: ['己酉','己未','己巳'] },
    '艮': { inner: ['丙辰','丙午','丙申'], outer: ['丙戌','丙子','丙寅'] },
    '兑': { inner: ['丁巳','丁卯','丁丑'], outer: ['丁亥','丁酉','丁未'] }
};

const BRANCH_ELEMENT = { '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' };
const GEN_MAP = { '木':'火','火':'土','土':'金','金':'水','水':'木' }; // a生b
const KE_MAP  = { '木':'土','土':'水','水':'火','火':'金','金':'木' }; // a克b
const LIUSHEN_ORDER = ['青龙','朱雀','勾陈','螣蛇','白虎','玄武'];
const LIUSHEN_START = { '甲':0,'乙':0,'丙':1,'丁':1,'戊':2,'己':3,'庚':4,'辛':4,'壬':5,'癸':5 };

function bitsToTrigramName(bits) {
    for (const name of TRIGRAM_NAMES) {
        const b = TRIGRAM_BITS[name];
        if (b[0] === bits[0] && b[1] === bits[1] && b[2] === bits[2]) return name;
    }
    return null;
}
function flipBit(b) { return b === 1 ? 0 : 1; }

// 依"京房八宫"规则，从任一本宫卦推演出该宫全部8卦（本宫/一至五世/游魂/归魂）及世爻位置
function generatePalaceGuas(homeName) {
    const h = TRIGRAM_BITS[homeName];
    const home6 = [h[0], h[1], h[2], h[0], h[1], h[2]];
    const guas = [{ bits: home6.slice(), world: 6 }];
    let cur = home6.slice(); cur[0] = flipBit(cur[0]); guas.push({ bits: cur.slice(), world: 1 });
    cur = cur.slice(); cur[1] = flipBit(cur[1]); guas.push({ bits: cur.slice(), world: 2 });
    cur = cur.slice(); cur[2] = flipBit(cur[2]); guas.push({ bits: cur.slice(), world: 3 });
    cur = cur.slice(); cur[3] = flipBit(cur[3]); guas.push({ bits: cur.slice(), world: 4 });
    cur = cur.slice(); cur[4] = flipBit(cur[4]); guas.push({ bits: cur.slice(), world: 5 });
    let youhun = cur.slice(); youhun[3] = flipBit(youhun[3]); guas.push({ bits: youhun.slice(), world: 4 });
    let guihun = youhun.slice(); guihun[0] = h[0]; guihun[1] = h[1]; guihun[2] = h[2];
    guas.push({ bits: guihun.slice(), world: 3 });
    return guas;
}

function findPalace(lineBits) {
    for (const homeName of TRIGRAM_NAMES) {
        const guas = generatePalaceGuas(homeName);
        for (const g of guas) {
            if (g.bits.every((b, i) => b === lineBits[i])) {
                return { palace: homeName, world: g.world, element: TRIGRAM_ELEMENT[homeName] };
            }
        }
    }
    return null;
}

function getNajiaLines(lowerName, upperName) {
    const lower = NAJIA_TABLE[lowerName].inner;
    const upper = NAJIA_TABLE[upperName].outer;
    return [...lower, ...upper]; // 6项，初爻→上爻
}

function getLiuQin(branch, palaceElement) {
    const e = BRANCH_ELEMENT[branch];
    if (e === palaceElement) return '兄弟';
    if (GEN_MAP[e] === palaceElement) return '父母';
    if (GEN_MAP[palaceElement] === e) return '子孙';
    if (KE_MAP[e] === palaceElement) return '官鬼';
    if (KE_MAP[palaceElement] === e) return '妻财';
    return '未知';
}

function getKongWang(dayStemIdx, dayBranchIdx) {
    const startBranch = ((dayBranchIdx - dayStemIdx) % 12 + 12) % 12;
    const void1 = BRANCHES[(startBranch + 10) % 12];
    const void2 = BRANCHES[(startBranch + 11) % 12];
    return [void1, void2];
}

/* 根据六爻录入（yaoValues：index0=初爻...index5=上爻）+ 日辰干支，排出完整卦盘 */
function computeFullPaipan(yaoValues, dayStemChar, dayBranchChar) {
    const isYang = v => (v === '少阳' || v === '老阳');
    const isMoving = v => (v === '老阳' || v === '老阴');

    const benBits = yaoValues.map(v => isYang(v) ? 1 : 0);
    const bianBits = yaoValues.map((v, i) => isMoving(v) ? flipBit(benBits[i]) : benBits[i]);

    const benLower = bitsToTrigramName(benBits.slice(0, 3));
    const benUpper = bitsToTrigramName(benBits.slice(3, 6));
    const benName = GUA_NAME_TABLE[benUpper][benLower];
    const palaceInfo = findPalace(benBits);

    const bianLower = bitsToTrigramName(bianBits.slice(0, 3));
    const bianUpper = bitsToTrigramName(bianBits.slice(3, 6));
    const bianName = GUA_NAME_TABLE[bianUpper][bianLower];

    const benNajia = getNajiaLines(benLower, benUpper);
    const bianNajia = getNajiaLines(bianLower, bianUpper);

    const dayStemIdx = STEMS.indexOf(dayStemChar);
    const dayBranchIdx = BRANCHES.indexOf(dayBranchChar);
    const voidBranches = getKongWang(dayStemIdx, dayBranchIdx);
    const liushenStart = LIUSHEN_START[dayStemChar];
    const worldPos = palaceInfo.world;
    const responsePos = ((worldPos - 1 + 3) % 6) + 1;

    const lines = [];
    for (let i = 0; i < 6; i++) {
        const pos = i + 1; // 1=初爻...6=上爻
        const najiaStr = benNajia[i];
        const branch = najiaStr[1];
        const liuqin = getLiuQin(branch, palaceInfo.element);
        const liushen = LIUSHEN_ORDER[(liushenStart + i) % 6];
        const moving = isMoving(yaoValues[i]);
        const line = {
            pos, yao: yaoValues[i], moving, najia: najiaStr, branch, liuqin, liushen,
            isWorld: pos === worldPos, isResponse: pos === responsePos,
            isVoid: voidBranches.includes(branch)
        };
        if (moving) {
            line.bianNajia = bianNajia[i];
            line.bianBranch = bianNajia[i][1];
        }
        lines.push(line);
    }

    return {
        benName, benPalace: palaceInfo.palace, benElement: palaceInfo.element,
        worldPos, responsePos, bianName, voidBranches, lines
    };
}

/* ============ 自动排盘预览渲染 ============ */
function renderPaipanPreview() {
    const area = document.getElementById('paipanArea');
    if (!area) return;

    const yaoValues = [];
    for (let i = 1; i <= 6; i++) {
        const selected = document.querySelector(`input[name="yao${i}"]:checked`);
        if (!selected) {
            area.innerHTML = '<div class="paipan-empty">选完六个爻之后，这里会自动排出专业卦盘</div>';
            return;
        }
        yaoValues.push(selected.value);
    }

    const dayStr = (document.getElementById('day').value || '').trim();
    if (!/^[甲乙丙丁戊己庚辛壬癸][子丑寅卯辰巳午未申酉戌亥]$/.test(dayStr)) {
        area.innerHTML = '<div class="paipan-empty">日柱干支格式不正确，暂无法排盘</div>';
        return;
    }

    let pp;
    try {
        pp = computeFullPaipan(yaoValues, dayStr[0], dayStr[1]);
    } catch (e) {
        area.innerHTML = '<div class="paipan-empty">排盘计算出错，请检查六爻录入</div>';
        return;
    }

    const yaoSym = { '少阳': '—', '少阴': '- -', '老阳': 'X', '老阴': 'o' };
    const rowsHtml = pp.lines.slice().reverse().map(l => `
        <tr>
            <td>${l.liushen}</td>
            <td><span class="pp-yao-sym">${yaoSym[l.yao]}</span></td>
            <td class="pp-liuqin">${l.liuqin}</td>
            <td class="pp-najia">${l.najia}(${BRANCH_ELEMENT[l.branch]})</td>
            <td><div class="pp-tags">
                ${l.isWorld ? '<span class="pp-tag world">世</span>' : ''}
                ${l.isResponse ? '<span class="pp-tag resp">应</span>' : ''}
                ${l.isVoid ? '<span class="pp-tag void">空</span>' : ''}
                ${l.moving ? '<span class="pp-tag move">动</span>' : ''}
            </div></td>
            <td class="pp-bian">${l.moving ? '→' + l.bianNajia + '(' + BRANCH_ELEMENT[l.bianBranch] + ')' : ''}</td>
        </tr>
    `).join('');

    area.innerHTML = `
        <div class="paipan-summary">
            <span>本卦：<b>${pp.benName}</b>（${pp.benPalace}宫）</span>
            <span>变卦：<b>${pp.bianName === pp.benName ? '无动爻，卦不变' : pp.bianName}</b></span>
            <span>日辰空亡：<b>${pp.voidBranches.join('、')}</b></span>
        </div>
        <table class="paipan-table">
            <thead><tr><th>六神</th><th>爻</th><th>六亲</th><th>纳甲</th><th>标记</th><th>动变</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
        </table>
    `;
}

function generatePrompt(query, year, month, day, hour, yaoValues, paipan) {
    const yaoDisplayNames = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];

    // 从上爻到初爻，符合传统排盘阅读习惯
    const linesTop2Bottom = paipan.lines.slice().reverse();
    const paipanTableText = linesTop2Bottom.map(l => {
        const tags = [];
        if (l.isWorld) tags.push('世');
        if (l.isResponse) tags.push('应');
        if (l.isVoid) tags.push('空亡');
        if (l.moving) tags.push('动爻');
        const tagText = tags.length ? `【${tags.join('·')}】` : '';
        const bianText = l.moving ? `　→ 动变为：${l.bianNajia}（${BRANCH_ELEMENT[l.bianBranch]}）` : '';
        return `${yaoDisplayNames[l.pos - 1]}：${l.liushen}　${l.liuqin}　${l.najia}（${BRANCH_ELEMENT[l.branch]}）${tagText}${bianText}`;
    }).join('\n');

    const movingCount = paipan.lines.filter(l => l.moving).length;
    const movingDesc = movingCount > 0
        ? paipan.lines.filter(l => l.moving).map(l => `${yaoDisplayNames[l.pos - 1]}（${l.liuqin}${l.najia}）动变为${l.bianNajia}（${BRANCH_ELEMENT[l.bianBranch]}）`).join('；')
        : '本卦无动爻，六爻安静';

    return `你是一位深谙中国传统《周易》占卜之道的权威专家，精通京房八宫六十四卦、纳甲筮法、六亲六神世应体系。你的解卦风格严谨、细致、富有深度，同时又能将古老的智慧与现代生活情境相结合。

1. 严格依据卦象：所有分析必须严格基于下方给出的排盘数据，不得臆造或脱离卦象空谈。
2. 系统性分析：遵循"由基到详，由体到用"的逻辑：先定用神，再看世应旺衰，再看动爻生克，最后综合断语。
3. 分点清晰阐述：结构清晰，分点分段，使用专业术语并对关键术语做简要解释，确保非专业用户也能看懂。

5. 给出范围，而非铁口直断：强调"卦象如此，事在人为"，解读是基于当前能量趋势的"可能性"，避免绝对化断言。

- 日辰（${day}）对用神地支是生、扶、克、耗、泄？

${movingCount > 0 ? `动爻是事情的枢纽，请逐一分析每个动爻：\n${paipan.lines.filter(l => l.moving).map(l => `- ${yaoDisplayNames[l.pos - 1]}（${l.liuqin}，${l.najia}）动变为${l.bianNajia}（${BRANCH_ELEMENT[l.bianBranch]}）：此爻发动对用神产生了什么影响（生、克、冲、合、刑、害，以及是否构成"回头生"或"回头克"）？这个变化揭示了事情发展中的哪个关键环节？`).join('\n')}` : '此卦无动爻，主事态相对稳定，变化不大，可重点从世应与日月生克关系判断趋势。'}

- 过程描述：描述事情可能的发展过程和关键节点，可结合应期（若卦中有明显应期信息）简要说明。
